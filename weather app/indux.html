<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather forcast</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <div class="container-fluid bg-primary  areaname mt-3 rounded-4 d-flex justify-content-center -align-items-center">
    <select class="text-align-center rounded-4 ">
    <option class="text-center border-0 ">Bahawalpur</option>
    <option class="text-center border-0">Lahore</option>
    <option class="text-center border-0">Islamabad</option>
    <option class="text-center border-0">dubai</option>
   </select>  
</div>
<div class="add-city text-center">
  <button class="rounded-2 border-0 button" onclick=button_function() ; > Add a city <i class="fa-solid fa-plus"></i></button>
  <div class="d-inline-block position-relative">
    <input placeholder="search your city" type="text" class="hidden">
    <ul class="position-absolute list-unstyled bg-white search-list w-100 ">
      
    </ul>
  </div>
  <button class="hidden submit-button" onclick=submit_buttton_function() ;>submit</button> 
  <select class="text-align-center rounded-4 country-select ">

  </select>
</div>  

 <div class="container-fluid ">
  <div class="grid custom-row pt-3 pb-3">
    <div class="box  rounded-4 temperature"><h5 class="container-fluid text-center mt-3">Temperature</h5><div class="d-flex justify-content-center align-items-center h-75"><p class="fs-2"></p>degree celcius</div></div>
    <div class="box  rounded-4 tommorow-weather d-flex justify-content-center align-items-center text-center"><p class="fs-3"></p></div>
    <div class="box  rounded-4 humidity"><h5 class="container-fluid text-center mt-3">Humidity</h5><div class="d-flex justify-content-center align-items-center h-75"><p class="fs-2"></p>percent</div></div>
    <div class="box  rounded-4 uv-index"><h5 class="container-fluid text-center mt-3">Uv index</h5><div class="d-flex justify-content-center align-items-center h-75"><p class="fs-2"></p>uv-index</div></div>
    <div class="box  rounded-4 text-center d-flex justify-content-center align-items-center" ><div><p class="fs-2 rain_box  mb-1"></p><P class=" precipitation_probability text-center fs-2 d-inline-block"></P>% is precipitation_probability right now</div> </div>
    <div class="box  rounded-4 feel-like-temperature"><h5 class="container-fluid text-center mt-3">Feel_like temperature</h5><div class="d-flex justify-content-center align-items-center h-75"><p class="fs-2"></p>degree celcius</div> </div>
  </div>
</div>
     <script src="codes.js"></script>
     <script src="app.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
